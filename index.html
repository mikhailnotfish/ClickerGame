<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Stardance Project</title>
  <link rel="icon" href="images/cobble.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1 id="title">minecraft clicker!</h1>
    <p id="desc">welcome to minecraft clicker!.</p>
    <div class="controls">
      <button id="lucky-btn">🎲 Lucky Click (costs 200)</button>
      <button id="frenzy-btn">Click Frenzy (costs 500)</button>
      <button id="btn">click me</button>
      <span id="count">Clicks: 0</span>
      <button id="upgrade-btn">Upgrade click power (costs 50) | Power: 1</button>
      <button id="auto-btn">Buy autoclicker (costs 100)</button>
      <button id="golden-btn">Golden mode (costs 1000)</button>
    </div>
    <hr />
    <h3>How to play</h3>
    <p>Click the button that says "click me".</p>
    <p style="font-size:11px; color:#000; margin-top:16px;">Music: "Wallpaper" by Kevin MacLeod (incompetech.com) — Licensed under CC BY 4.0</p>
  </main>
  <audio id="bg-music" src="https://raw.githubusercontent.com/mikhailnotfish/ClickerGame/main/Wallpaper.mp3" loop></audio>
  <script src="script.js"></script>
</body>
</html>
